<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1</title>
</head>
<body>
    <h1>Cálculo de Notas</h1>
    <form method="POST" action="/ejercicio1">
        <label>Nota 1 (10-70):</label>
        <input type="number" name="nota1" min="10" max="70" required><br><br>

        <label>Nota 2 (10-70):</label>
        <input type="number" name="nota2" min="10" max="70" required><br><br>

        <label>Nota 3 (10-70):</label>
        <input type="number" name="nota3" min="10" max="70" required><br><br>

        <label>Asistencia (%):</label>
        <input type="number" name="asistencia" min="0" max="100" required><br><br>

        <button type="submit">Enviar</button>
    </form>

    {% if promedio %}
        <hr>
        <h3>Resultados:</h3>
        <p>Promedio: <strong>{{ promedio }}</strong></p>
        <p>Estado: <strong>{{ estado }}</strong></p>
    {% endif %}

    <br><br>
    <a href="/">Volver al Menú Principal</a>
</body>
</html>
